<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 - 가계부</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f0e1a;
        color: #e0e7ff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        text-align: center;
        padding: 2rem;
        gap: 1.5rem;
      }
      .icon { font-size: 4rem; }
      h1 { font-size: 1.5rem; font-weight: 700; color: #a5b4fc; }
      p { font-size: 0.95rem; color: #818cf8; line-height: 1.6; }
      button {
        margin-top: 0.5rem;
        padding: 0.75rem 2rem;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 0.75rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover { background: #6366f1; }
    </style>
  </head>
  <body>
    <div class="icon">📡</div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결을 확인해 주세요.<br />연결이 복구되면 자동으로 재시도합니다.</p>
    <button onclick="window.location.reload()">다시 시도</button>
  </body>
</html>
