<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 - 가계부</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f0e1a;
        color: #e0e7ff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        text-align: center;
        padding: 2rem;
        gap: 1.5rem;
      }
      .icon { font-size: 4rem; }
      h1 { font-size: 1.5rem; font-weight: 700; color: #a5b4fc; }
      p { font-size: 0.95rem; color: #818cf8; line-height: 1.6; }
      button {
        margin-top: 0.5rem;
        padding: 0.75rem 2rem;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 0.75rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover { background: #6366f1; }
    </style>
  </head>
  <body>
    <div class="icon">📡</div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결을 확인해 주세요.<br />연결이 복구되면 자동으로 재시도합니다.</p>
    <button id="retry-btn">다시 시도</button>

    <script>
      // 1. 인터넷 연결이 복구되면 자동으로 새로고침
      window.addEventListener('online', () => {
        location.reload();
      });

      // 2. 다시 시도 버튼 클릭 시 서비스 워커를 정리하고 새로고침 시도
      document.getElementById('retry-btn').addEventListener('click', async () => {
        const btn = document.getElementById('retry-btn');
        btn.disabled = true;
        btn.textContent = '확인 중...';

        // 서비스 워커가 등록되어 있다면 먼저 제거 시도 (꼬인 설정을 풀기 위함)
        if ('serviceWorker' in navigator) {
          try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (const registration of registrations) {
              await registration.unregister();
            }
          } catch (e) {
            console.error('SW unregister failed:', e);
          }
        }

        // 실제 네트워크 상태가 온라인인 경우에만 새로고침 (가짜 오프라인 방지)
        if (navigator.onLine) {
          window.location.reload(true);
        } else {
          btn.disabled = false;
          btn.textContent = '다시 시도';
          alert('아직 인터넷에 연결되지 않았습니다. 연결 상태를 확인해 주세요.');
        }
      });
    </script>
  </body>
</html>
